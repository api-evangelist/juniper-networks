      - Network Management
      - SD-WAN
      - Wireless
    serviceName: Juniper Mist API
    serviceCategory: API
  - name: Juniper Contrail API
    baseURL: https://<contrail-controller>:8082
    tags:
      - NFV
      - Orchestration
      - SDN
      - Virtual Networks
    serviceName: Juniper Contrail API
    serviceCategory: API
  - name: Junos Space REST API
    baseURL: https://<space-server>/api/space
