specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Juniper Networks
providerId: juniper-networks
publisherName: Juniper Networks, Inc.
serviceCategory: Networking / SDN / Security
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Juniper does not expose a per-call usage-billing surface; APIs are entitlements of
  product subscriptions. FinOps shape inferred from a subscription / license model. Meters
  reflect typical infrastructure-management billable units (devices, sites, APs).
tags:
  - Automation
  - Cloud
  - Data Center
  - Enterprise
  - Networking
  - SDN
  - Security
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps scaffold for Juniper Networks product APIs. Treated as
  subscription / license-bundled access; meters reflect product-line entitlements.
sources:
  - https://www.juniper.net/us/en/dm/api-catalog.html
  - https://www.finops.org/framework/
  - https://focus.finops.org/focus-specification/v1-3/
billingModel:
  pricingCategory: Subscription / License
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: Juniper Networks Product APIs
  ServiceCategory: Networking / SDN / Security
  ProviderName: Juniper Networks
  PublisherName: Juniper Networks, Inc.
  InvoiceIssuerName: Juniper Networks, Inc.
  BillingCurrency: USD
meters:
  - name: managed_devices
    unit: device
    aggregation: max
    dimensions:
      - product
      - site
      - org
  - name: managed_aps
    unit: access_point
    aggregation: max
    dimensions:
      - site
      - org
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - product
      - org
principles:
  - name: Visibility
    description: Track managed-device and AP counts in Mist / Apstra dashboards; reconcile
      against renewal entitlements.
  - name: Allocation
    description: Allocate by site / org_id since most Juniper subscriptions are scoped to
      organizations and locations.
  - name: Optimization
    description: Right-size license tiers (e.g. Mist Wi-Fi Assurance vs Premium Analytics)
      against the API features your automation actually uses.
  - name: Accountability
    description: Network operations team typically owns Juniper spend; pair with the partner /
      reseller account team for renewal cycles.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
