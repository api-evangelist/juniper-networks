      - name: Email Support
      - name: SLA Targets
      - name: Webhook Subscriptions
      - name: Juniper Apstra API
      - name: Junos PyEZ
      - name: Junos XML API
      - name: Juniper Mist API
      - name: Juniper Contrail API
      - name: Junos Space REST API
      - name: Juniper JSNAPy
      - name: Juniper vSRX REST API
  - id: juniper-networks-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-negotiated tier for Juniper Networks. Includes dedicated capacity, contractual
      SLAs, security review, data residency options, and named technical account management.
    entries:
      - label: API Requests
        description: Negotiated request volume; -1 indicates uncapped subject to fair use
        name: api_requests
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: configurable
        domains:
          - https://<apstra-server>/api
          - netconf://device:830
          - https://api.mist.com/api/v1
          - https://<contrail-controller>:8082
