        name: api_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: included with product subscription
        userMultiplied: false
    elements:
      - name: Active Juniper product subscription required
      - name: API capabilities scoped to product SKU and tier
      - name: Sandbox / trial via Juniper portal where available
