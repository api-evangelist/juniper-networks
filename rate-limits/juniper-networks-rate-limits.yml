specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Juniper Networks
providerId: juniper-networks
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Juniper Networks does not publish a single canonical public rate-limit table.
  The Mist API documentation references rate-limit headers and throttling but the
  authoritative numbers are gated behind authenticated docs. Reconciliation blocked
  pending publicly accessible rate-limit numbers per product.
tags:
  - Automation
  - Cloud
  - Data Center
  - Enterprise
  - Networking
  - SDN
  - Security
  - Rate Limiting
description: Rate-limit artifact for Juniper Networks product APIs (Mist, Apstra, Junos,
  Paragon). Per-product limits exist but are documented inside authenticated product
  documentation rather than on a public page.
sources:
  - https://api.mist.com/api/v1/docs/Home
  - https://www.juniper.net/documentation/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-product API throttle
    scope: api-token/org
    metric: varies
    limit: see authenticated product API documentation (Mist, Apstra, Junos Space)
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on 429 / 503 responses
      and honor the Retry-After header when present.
  - name: Per-Product Limits
    description: Limits are scoped per product (Mist cloud, Apstra controller, Paragon)
      and are typically expressed via X-RateLimit-* headers.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
