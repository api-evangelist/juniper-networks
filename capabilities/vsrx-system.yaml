naftiko: 1.0.0-alpha2
info:
  label: Juniper Networks Juniper vSRX REST API — System
  description: 'Juniper Networks Juniper vSRX REST API — System. 2 operations. Lead operation: Juniper Networks List system
    alarms. Self-contained Naftiko capability covering one Juniper Networks business surface.'
  tags:
  - Juniper Networks
  - System
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JUNIPER_NETWORKS_API_KEY: JUNIPER_NETWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: vsrx-system
    baseUri: https://{vsrx_host}/api
    description: Juniper Networks Juniper vSRX REST API — System business capability. Self-contained, no shared references.
    resources:
    - name: v1-system-alarms
      path: /v1/system/alarms
      operations:
      - name: listsystemalarms
        method: GET
        description: Juniper Networks List system alarms
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-system-information
      path: /v1/system/information
      operations:
      - name: getsysteminformation
        method: GET
        description: Juniper Networks Get system information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.JUNIPER_NETWORKS_USER}}'
      password: '{{env.JUNIPER_NETWORKS_PASS}}'
  exposes:
  - type: rest
    namespace: vsrx-system-rest
    port: 8080
    description: REST adapter for Juniper Networks Juniper vSRX REST API — System. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/system/alarms
      name: v1-system-alarms
      description: REST surface for v1-system-alarms.
      operations:
      - method: GET
        name: listsystemalarms
        description: Juniper Networks List system alarms
        call: vsrx-system.listsystemalarms
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/system/information
      name: v1-system-information
      description: REST surface for v1-system-information.
      operations:
      - method: GET
        name: getsysteminformation
        description: Juniper Networks Get system information
        call: vsrx-system.getsysteminformation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vsrx-system-mcp
    port: 9090
    transport: http
    description: MCP adapter for Juniper Networks Juniper vSRX REST API — System. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: juniper-networks-list-system-alarms
      description: Juniper Networks List system alarms
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vsrx-system.listsystemalarms
      outputParameters:
      - type: object
        mapping: $.
    - name: juniper-networks-get-system-information
      description: Juniper Networks Get system information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vsrx-system.getsysteminformation
      outputParameters:
      - type: object
        mapping: $.
