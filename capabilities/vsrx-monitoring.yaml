naftiko: 1.0.0-alpha2
info:
  label: Juniper Networks Juniper vSRX REST API — Monitoring
  description: 'Juniper Networks Juniper vSRX REST API — Monitoring. 1 operations. Lead operation: Juniper Networks List active
    flow sessions. Self-contained Naftiko capability covering one Juniper Networks business surface.'
  tags:
  - Juniper Networks
  - Monitoring
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JUNIPER_NETWORKS_API_KEY: JUNIPER_NETWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: vsrx-monitoring
    baseUri: https://{vsrx_host}/api
    description: Juniper Networks Juniper vSRX REST API — Monitoring business capability. Self-contained, no shared references.
    resources:
    - name: v1-monitoring-security-flow-session
      path: /v1/monitoring/security/flow/session
      operations:
      - name: listflowsessions
        method: GET
        description: Juniper Networks List active flow sessions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: source_prefix
          in: query
          type: string
          description: Filter by source IP prefix.
        - name: destination_prefix
          in: query
          type: string
          description: Filter by destination IP prefix.
        - name: application
          in: query
          type: string
          description: Filter by application name.
    authentication:
      type: basic
      username: '{{env.JUNIPER_NETWORKS_USER}}'
      password: '{{env.JUNIPER_NETWORKS_PASS}}'
  exposes:
  - type: rest
    namespace: vsrx-monitoring-rest
    port: 8080
    description: REST adapter for Juniper Networks Juniper vSRX REST API — Monitoring. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/monitoring/security/flow/session
      name: v1-monitoring-security-flow-session
      description: REST surface for v1-monitoring-security-flow-session.
      operations:
      - method: GET
        name: listflowsessions
        description: Juniper Networks List active flow sessions
        call: vsrx-monitoring.listflowsessions
        with:
          source_prefix: rest.source_prefix
          destination_prefix: rest.destination_prefix
          application: rest.application
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vsrx-monitoring-mcp
    port: 9090
    transport: http
    description: MCP adapter for Juniper Networks Juniper vSRX REST API — Monitoring. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: juniper-networks-list-active-flow
      description: Juniper Networks List active flow sessions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vsrx-monitoring.listflowsessions
      with:
        source_prefix: tools.source_prefix
        destination_prefix: tools.destination_prefix
        application: tools.application
      outputParameters:
      - type: object
        mapping: $.
