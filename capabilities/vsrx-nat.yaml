naftiko: 1.0.0-alpha2
info:
  label: Juniper Networks Juniper vSRX REST API — NAT
  description: 'Juniper Networks Juniper vSRX REST API — NAT. 2 operations. Lead operation: Juniper Networks List destination
    NAT rules. Self-contained Naftiko capability covering one Juniper Networks business surface.'
  tags:
  - Juniper Networks
  - NAT
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JUNIPER_NETWORKS_API_KEY: JUNIPER_NETWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: vsrx-nat
    baseUri: https://{vsrx_host}/api
    description: Juniper Networks Juniper vSRX REST API — NAT business capability. Self-contained, no shared references.
    resources:
    - name: v1-security-nat-destination
      path: /v1/security/nat/destination
      operations:
      - name: listdestinationnatrules
        method: GET
        description: Juniper Networks List destination NAT rules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-security-nat-source
      path: /v1/security/nat/source
      operations:
      - name: listsourcenatrules
        method: GET
        description: Juniper Networks List source NAT rules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.JUNIPER_NETWORKS_USER}}'
      password: '{{env.JUNIPER_NETWORKS_PASS}}'
  exposes:
  - type: rest
    namespace: vsrx-nat-rest
    port: 8080
    description: REST adapter for Juniper Networks Juniper vSRX REST API — NAT. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/security/nat/destination
      name: v1-security-nat-destination
      description: REST surface for v1-security-nat-destination.
      operations:
      - method: GET
        name: listdestinationnatrules
        description: Juniper Networks List destination NAT rules
        call: vsrx-nat.listdestinationnatrules
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/security/nat/source
      name: v1-security-nat-source
      description: REST surface for v1-security-nat-source.
      operations:
      - method: GET
        name: listsourcenatrules
        description: Juniper Networks List source NAT rules
        call: vsrx-nat.listsourcenatrules
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vsrx-nat-mcp
    port: 9090
    transport: http
    description: MCP adapter for Juniper Networks Juniper vSRX REST API — NAT. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: juniper-networks-list-destination-nat
      description: Juniper Networks List destination NAT rules
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vsrx-nat.listdestinationnatrules
      outputParameters:
      - type: object
        mapping: $.
    - name: juniper-networks-list-source-nat
      description: Juniper Networks List source NAT rules
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vsrx-nat.listsourcenatrules
      outputParameters:
      - type: object
        mapping: $.
