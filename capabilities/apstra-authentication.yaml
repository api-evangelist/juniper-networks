naftiko: 1.0.0-alpha2
info:
  label: Juniper Networks Juniper Apstra Intent-Based Networking API — Authentication
  description: 'Juniper Networks Juniper Apstra Intent-Based Networking API — Authentication. 2 operations. Lead operation:
    Juniper Networks Authenticate and obtain token. Self-contained Naftiko capability covering one Juniper Networks business
    surface.'
  tags:
  - Juniper Networks
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JUNIPER_NETWORKS_API_KEY: JUNIPER_NETWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: apstra-authentication
    baseUri: https://{apstra_server}/api
    description: Juniper Networks Juniper Apstra Intent-Based Networking API — Authentication business capability. Self-contained,
      no shared references.
    resources:
    - name: aaa-login
      path: /aaa/login
      operations:
      - name: login
        method: POST
        description: Juniper Networks Authenticate and obtain token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: aaa-logout
      path: /aaa/logout
      operations:
      - name: logout
        method: POST
        description: Juniper Networks Logout and invalidate token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: AuthToken
      value: '{{env.JUNIPER_NETWORKS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: apstra-authentication-rest
    port: 8080
    description: REST adapter for Juniper Networks Juniper Apstra Intent-Based Networking API — Authentication. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/aaa/login
      name: aaa-login
      description: REST surface for aaa-login.
      operations:
      - method: POST
        name: login
        description: Juniper Networks Authenticate and obtain token
        call: apstra-authentication.login
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/aaa/logout
      name: aaa-logout
      description: REST surface for aaa-logout.
      operations:
      - method: POST
        name: logout
        description: Juniper Networks Logout and invalidate token
        call: apstra-authentication.logout
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: apstra-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Juniper Networks Juniper Apstra Intent-Based Networking API — Authentication. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: juniper-networks-authenticate-and-obtain
      description: Juniper Networks Authenticate and obtain token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: apstra-authentication.login
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: juniper-networks-logout-and-invalidate
      description: Juniper Networks Logout and invalidate token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: apstra-authentication.logout
      outputParameters:
      - type: object
        mapping: $.
