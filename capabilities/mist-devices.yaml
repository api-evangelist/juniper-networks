naftiko: 1.0.0-alpha2
info:
  label: Juniper Networks Juniper Mist Cloud API — Devices
  description: 'Juniper Networks Juniper Mist Cloud API — Devices. 3 operations. Lead operation: Juniper Networks List site
    devices. Self-contained Naftiko capability covering one Juniper Networks business surface.'
  tags:
  - Juniper Networks
  - Devices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JUNIPER_NETWORKS_API_KEY: JUNIPER_NETWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: mist-devices
    baseUri: https://api.mist.com/api/v1
    description: Juniper Networks Juniper Mist Cloud API — Devices business capability. Self-contained, no shared references.
    resources:
    - name: sites-site_id-devices
      path: /sites/{site_id}/devices
      operations:
      - name: listsitedevices
        method: GET
        description: Juniper Networks List site devices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: Filter by device type.
    - name: sites-site_id-devices-device_id
      path: /sites/{site_id}/devices/{device_id}
      operations:
      - name: getsitedevice
        method: GET
        description: Juniper Networks Get device
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesitedevice
        method: PUT
        description: Juniper Networks Update device
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.JUNIPER_NETWORKS_API_KEY}}'
  exposes:
  - type: rest
    namespace: mist-devices-rest
    port: 8080
    description: REST adapter for Juniper Networks Juniper Mist Cloud API — Devices. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/sites/{site-id}/devices
      name: sites-site-id-devices
      description: REST surface for sites-site_id-devices.
      operations:
      - method: GET
        name: listsitedevices
        description: Juniper Networks List site devices
        call: mist-devices.listsitedevices
        with:
          type: rest.type
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sites/{site-id}/devices/{device-id}
      name: sites-site-id-devices-device-id
      description: REST surface for sites-site_id-devices-device_id.
      operations:
      - method: GET
        name: getsitedevice
        description: Juniper Networks Get device
        call: mist-devices.getsitedevice
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesitedevice
        description: Juniper Networks Update device
        call: mist-devices.updatesitedevice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mist-devices-mcp
    port: 9090
    transport: http
    description: MCP adapter for Juniper Networks Juniper Mist Cloud API — Devices. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: juniper-networks-list-site-devices
      description: Juniper Networks List site devices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mist-devices.listsitedevices
      with:
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
    - name: juniper-networks-get-device
      description: Juniper Networks Get device
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mist-devices.getsitedevice
      outputParameters:
      - type: object
        mapping: $.
    - name: juniper-networks-update-device
      description: Juniper Networks Update device
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: mist-devices.updatesitedevice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
