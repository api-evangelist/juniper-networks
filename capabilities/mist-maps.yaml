naftiko: 1.0.0-alpha2
info:
  label: Juniper Networks Juniper Mist Cloud API — Maps
  description: 'Juniper Networks Juniper Mist Cloud API — Maps. 1 operations. Lead operation: Juniper Networks List site maps.
    Self-contained Naftiko capability covering one Juniper Networks business surface.'
  tags:
  - Juniper Networks
  - Maps
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JUNIPER_NETWORKS_API_KEY: JUNIPER_NETWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: mist-maps
    baseUri: https://api.mist.com/api/v1
    description: Juniper Networks Juniper Mist Cloud API — Maps business capability. Self-contained, no shared references.
    resources:
    - name: sites-site_id-maps
      path: /sites/{site_id}/maps
      operations:
      - name: listsitemaps
        method: GET
        description: Juniper Networks List site maps
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.JUNIPER_NETWORKS_API_KEY}}'
  exposes:
  - type: rest
    namespace: mist-maps-rest
    port: 8080
    description: REST adapter for Juniper Networks Juniper Mist Cloud API — Maps. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/sites/{site-id}/maps
      name: sites-site-id-maps
      description: REST surface for sites-site_id-maps.
      operations:
      - method: GET
        name: listsitemaps
        description: Juniper Networks List site maps
        call: mist-maps.listsitemaps
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mist-maps-mcp
    port: 9090
    transport: http
    description: MCP adapter for Juniper Networks Juniper Mist Cloud API — Maps. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: juniper-networks-list-site-maps
      description: Juniper Networks List site maps
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mist-maps.listsitemaps
      outputParameters:
      - type: object
        mapping: $.
