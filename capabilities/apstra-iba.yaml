      shared references.
    resources:
    - name: blueprints-blueprint_id-iba-probes
      path: /blueprints/{blueprint_id}/iba/probes
      operations:
      - name: listibaprobes
        method: GET
        description: Juniper Networks List IBA probes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
